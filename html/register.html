<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="../css/register.css">
</head>
<body>
    <div class="login-container">
        <form onsubmit="submitform(event)" class="login">
            <h1>Room Grid</h1>
            <h3>Register</h3>
            <input type="text" id="username" placeholder="Username" value="admin" required><br>  <!-- pre-filled "admin" username for testing purposes -->
            <input type="email" id="email" placeholder="Email" value="admin@roomgrid.com" required><br> <!-- pre-filled "admin@roomgrid.com" email for testing purposes -->
            <input type="password" id="password" placeholder="Password" value="pogiako123" required> <br> <!-- pre-filled "pogiako123" password for testing purposes -->
            <div class="role">
                <select name="role" id="role" required>
                    <option value="admin" disabled selected>Select Role</option> <!-- pre-filled "admin" value for testing purposes -->
                    <option value="admin">Admin</option>
                    <option value="user">User</option>
                </select>
            </div>
            <button type="submit">Register</button>
                <div class="register">
                    <p for="login-link">Already have an account? <a href="login.html" id="login-link">Log in</a></p>
                </div>
        </form>
    </div>
    <script src="../js/register.js"></script>
</body>
</html>
